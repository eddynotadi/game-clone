<!DOCTYPE html>

<head>

  <title>Playbox Runner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      display: block;
      touch-action: none;
    }
  </style>
</head>
<body>
  <!-- Game canvas injected by PixiJS -->
  <script>
    // Playbox Runner — game bootstrap
    // PixiJS and game logic will be added in subsequent commits
    document.body.style.background = '#0d0d2b';
    const placeholder = document.createElement('div');
    placeholder.style.cssText = 'color:#a259ff;font-family:monospace;font-size:24px;text-align:center;';
    placeholder.textContent = 'PLAYBOX RUNNER — LOADING...';
    document.body.appendChild(placeholder);
  </script>
