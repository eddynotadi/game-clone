<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Playbox Runner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      display: flex; align-items: center; justify-content: center;
    }
    canvas { display: block; touch-action: none; }
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.2/dist/pixi.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════════════════════════
const DESIGN_W  = 390;
const DESIGN_H  = 844;
const GROUND_Y  = DESIGN_H * 0.78;   // 658px — ground line
const CTA_H     = DESIGN_H * 0.10;   // 84px  — CTA bar at bottom

const SCROLL_SPEED = 3;  // px per frame (base)

// Spritesheet grids
const CHAR_COLS = 5, CHAR_ROWS = 4;
const CHAR_W = 930 / CHAR_COLS;   // 186
const CHAR_H = 860 / CHAR_ROWS;   // 215

const ENEMY_COLS = 5, ENEMY_ROWS = 4;
const ENEMY_W = 1200 / ENEMY_COLS;  // 240
const ENEMY_H = 960  / ENEMY_ROWS;  // 192

const COIN_FRAMES = 6;
const COIN_FRAME_W = 384 / COIN_FRAMES;  // 64
const COIN_FRAME_H = 209;

// ═══════════════════════════════════════════════════════════════════════════════
//  APP
// ═══════════════════════════════════════════════════════════════════════════════
const app = new PIXI.Application({
  width: DESIGN_W, height: DESIGN_H,
  backgroundColor: 0x0d0d2b,
  antialias: false,
  resolution: window.devicePixelRatio || 1,
  autoDensity: true,
});
document.body.appendChild(app.view);

function resize() {
  const s = Math.min(window.innerWidth / DESIGN_W, window.innerHeight / DESIGN_H);
  app.view.style.width  = Math.floor(DESIGN_W * s) + 'px';
  app.view.style.height = Math.floor(DESIGN_H * s) + 'px';
}
window.addEventListener('resize', resize);
resize();

// ═══════════════════════════════════════════════════════════════════════════════
//  PARALLAX BACKGROUND
// ═══════════════════════════════════════════════════════════════════════════════
class ParallaxBackground {
  constructor(stage) {
    this.container = new PIXI.Container();
    stage.addChild(this.container);

    // BG image is 1707x704 — scale so height fills from top to ground
    const bgTex = PIXI.Texture.from('assets/bg.webp');
    const bgScale = (GROUND_Y + 20) / 704;  // fit height to ground
    const bgW = Math.ceil(1707 * bgScale);   // scaled tile width

    // Two tiles for seamless loop
    this.bgTiles = [];
    for (let i = 0; i < 2; i++) {
      const s = new PIXI.Sprite(bgTex);
      s.scale.set(bgScale);
      s.x = i * bgW;
      s.y = 0;
      this.container.addChild(s);
      this.bgTiles.push(s);
    }
    this.bgW = bgW;

    // Mid props — neon billboard (prop1)
    const prop1Tex = PIXI.Texture.from('assets/prop1.webp');
    this.billboards = this._createPropLayer(prop1Tex, 120, 60, 3, 280, 350);

    // Foreground props — street lamp (prop2)
    const prop2Tex = PIXI.Texture.from('assets/prop2.webp');
    this.lamps = this._createPropLayer(prop2Tex, 30, 80, 4, 170, 250);

    // Glowing ground road
    this._buildGround();
  }

  _createPropLayer(tex, baseH, variance, count, xStart, xGap) {
    const props = [];
    for (let i = 0; i < count; i++) {
      const s = new PIXI.Sprite(tex);
      const h = baseH + Math.random() * variance;
      const scale = h / tex.height;
      s.scale.set(scale);
      s.anchor.set(0.5, 1);
      s.x = xStart + i * (xGap + Math.random() * 80);
      s.y = GROUND_Y;
      this.container.addChild(s);
      props.push({ sprite: s, baseX: s.x });
    }
    return props;
  }

  _buildGround() {
    const g = new PIXI.Graphics();
    // Road surface gradient effect via overlapping rects
    g.beginFill(0x0a0a1a);
    g.drawRect(0, GROUND_Y, DESIGN_W, DESIGN_H - GROUND_Y - CTA_H);
    g.endFill();

    // Neon ground line
    g.lineStyle(3, 0x00ffff, 1.0);
    g.moveTo(0, GROUND_Y);
    g.lineTo(DESIGN_W, GROUND_Y);

    // Secondary glow line
    g.lineStyle(8, 0x00ffff, 0.15);
    g.moveTo(0, GROUND_Y);
    g.lineTo(DESIGN_W, GROUND_Y);

    this.container.addChild(g);
  }

  update(delta, scrollSpeed) {
    // Background — slowest (0.2x)
    for (const tile of this.bgTiles) {
      tile.x -= scrollSpeed * 0.2 * delta;
    }
    // Wrap background tiles
    const ref = this.bgTiles[0];
    if (ref.x + this.bgW <= 0) {
      this.bgTiles[0].x = this.bgTiles[1].x + this.bgW;
      this.bgTiles.push(this.bgTiles.shift());
    }

    // Billboards — mid speed (0.5x)
    for (const p of this.billboards) {
      p.sprite.x -= scrollSpeed * 0.5 * delta;
      if (p.sprite.x + p.sprite.width < 0) {
        p.sprite.x = DESIGN_W + p.sprite.width / 2 + Math.random() * 200;
      }
    }

    // Lamps — faster (0.7x)
    for (const p of this.lamps) {
      p.sprite.x -= scrollSpeed * 0.7 * delta;
      if (p.sprite.x + p.sprite.width < 0) {
        p.sprite.x = DESIGN_W + p.sprite.width / 2 + Math.random() * 150;
      }
    }
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
//  PLAYER
// ═══════════════════════════════════════════════════════════════════════════════
const STATE = { IDLE: 0, RUNNING: 1, JUMPING: 2, HURT: 3 };

class Player {
  constructor(stage) {
    this.state      = STATE.RUNNING;
    this.vy         = 0;
    this.onGround   = true;
    this.hurtTimer  = 0;
    this.blinkTimer = 0;

    // Build frame textures from spritesheet
    const base = PIXI.BaseTexture.from('assets/character.webp');
    const makeFrames = (row, count) => {
      const frames = [];
      for (let c = 0; c < count; c++) {
        frames.push(new PIXI.Texture(base,
          new PIXI.Rectangle(c * CHAR_W, row * CHAR_H, CHAR_W, CHAR_H)));
      }
      return frames;
    };

    this.anims = {
      [STATE.RUNNING]: makeFrames(0, 5),
      [STATE.JUMPING]: makeFrames(1, 5),
      [STATE.IDLE]:    makeFrames(2, 5),
      [STATE.HURT]:    makeFrames(3, 5),
    };

    this.sprite = new PIXI.AnimatedSprite(this.anims[STATE.RUNNING]);
    this.sprite.animationSpeed = 0.15;
    this.sprite.play();

    // Scale to good in-game size (~80px tall)
    const scale = 80 / CHAR_H;
    this.sprite.scale.set(scale);
    this.sprite.anchor.set(0.5, 1);

    // Position: 25% from left, standing on ground
    this.sprite.x = DESIGN_W * 0.25;
    this.sprite.y = GROUND_Y;

    stage.addChild(this.sprite);

    // Hitbox (used for collision) — 60% of visual
    this.hitW = CHAR_W * scale * 0.6;
    this.hitH = 80 * 0.9;
  }

  jump() {
    if (!this.onGround || this.state === STATE.HURT) return;
    this.vy = -14;
    this.onGround = false;
    this._setState(STATE.JUMPING);
  }

  hurt() {
    if (this.hurtTimer > 0) return false; // still invincible
    this.hurtTimer  = 90; // 1.5s at 60fps
    this.blinkTimer = 0;
    this._setState(STATE.HURT);
    return true;
  }

  _setState(s) {
    if (this.state === s) return;
    this.state = s;
    this.sprite.textures = this.anims[s];
    this.sprite.gotoAndPlay(0);
  }

  get hitBox() {
    return {
      x: this.sprite.x - this.hitW / 2,
      y: this.sprite.y - this.hitH,
      w: this.hitW,
      h: this.hitH,
    };
  }

  update(delta) {
    const GRAVITY = 0.6;

    // Hurt invincibility + blink
    if (this.hurtTimer > 0) {
      this.hurtTimer -= delta;
      this.blinkTimer += delta;
      this.sprite.visible = Math.floor(this.blinkTimer / 4) % 2 === 0;
      if (this.hurtTimer <= 0) {
        this.sprite.visible = true;
        if (this.onGround) this._setState(STATE.RUNNING);
      }
    }

    // Physics
    if (!this.onGround) {
      this.vy += GRAVITY * delta;
      this.sprite.y += this.vy * delta;

      if (this.sprite.y >= GROUND_Y) {
        this.sprite.y = GROUND_Y;
        this.vy = 0;
        this.onGround = true;
        if (this.state !== STATE.HURT) this._setState(STATE.RUNNING);
      }

      // Switch to fall frames when descending
      if (this.state === STATE.JUMPING && this.vy > 2) {
        // stay on jump anim — or optionally flip to a land anim
      }
    }
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
//  ENEMY MANAGER
// ═══════════════════════════════════════════════════════════════════════════════
class EnemyManager {
  constructor(stage) {
    this.stage    = stage;
    this.enemies  = [];
    this.spawnTimer    = 0;
    this.spawnInterval = 180; // frames (~3s at 60fps)

    // Robot spritesheet
    const base = PIXI.BaseTexture.from('assets/enemy.webp');
    this.robotFrames = [];
    for (let c = 0; c < ENEMY_COLS; c++) {
      this.robotFrames.push(new PIXI.Texture(base,
        new PIXI.Rectangle(c * ENEMY_W, 0, ENEMY_W, ENEMY_H)));
    }

    // Laser barrier texture
    this.laserTex = PIXI.Texture.from('assets/obstacle.webp');
  }

  _spawnRobot(scrollSpeed) {
    const sprite = new PIXI.AnimatedSprite(this.robotFrames);
    sprite.animationSpeed = 0.18;
    sprite.play();
    const scale = 70 / ENEMY_H;
    sprite.scale.set(scale);
    sprite.anchor.set(0.5, 1);
    sprite.x = DESIGN_W + 60;
    sprite.y = GROUND_Y;
    this.stage.addChild(sprite);
    return { sprite, type: 'robot', speed: scrollSpeed * 1.2,
             w: ENEMY_W * scale * 0.6, h: 70 * 0.9 };
  }

  _spawnLaser(scrollSpeed) {
    const sprite = new PIXI.Sprite(this.laserTex);
    const targetH = 90;
    const scale = targetH / this.laserTex.height;
    sprite.scale.set(scale);
    sprite.anchor.set(0.5, 1);
    sprite.x = DESIGN_W + 40;
    sprite.y = GROUND_Y;
    this.stage.addChild(sprite);
    return { sprite, type: 'laser', speed: scrollSpeed,
             w: this.laserTex.width * scale * 0.5, h: targetH * 0.85 };
  }

  spawn(scrollSpeed) {
    const type = Math.random() < 0.6 ? 'robot' : 'laser';
    const enemy = type === 'robot'
      ? this._spawnRobot(scrollSpeed)
      : this._spawnLaser(scrollSpeed);
    this.enemies.push(enemy);
  }

  getHitBoxes() {
    return this.enemies.map(e => ({
      x: e.sprite.x - e.w / 2,
      y: e.sprite.y - e.h,
      w: e.w, h: e.h,
      ref: e,
    }));
  }

  update(delta, scrollSpeed, newInterval) {
    this.spawnInterval = newInterval;
    this.spawnTimer += delta;
    if (this.spawnTimer >= this.spawnInterval) {
      this.spawnTimer = 0;
      this.spawn(scrollSpeed);
    }

    for (const e of this.enemies) {
      e.sprite.x -= e.speed * delta;
    }

    // Remove off-screen enemies
    this.enemies = this.enemies.filter(e => {
      if (e.sprite.x < -100) {
        this.stage.removeChild(e.sprite);
        e.sprite.destroy();
        return false;
      }
      return true;
    });
  }

  reset() {
    for (const e of this.enemies) {
      this.stage.removeChild(e.sprite);
      e.sprite.destroy();
    }
    this.enemies = [];
    this.spawnTimer = 0;
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════════════════════
const bg      = new ParallaxBackground(app.stage);
const player  = new Player(app.stage);
const enemies = new EnemyManager(app.stage);

let scrollSpeed    = SCROLL_SPEED;
let spawnInterval  = 180;
let elapsed        = 0;

// Input — tap or click to jump
function onTap() { player.jump(); }
app.view.addEventListener('pointerdown', onTap);

app.ticker.add((delta) => {
  elapsed += delta;

  // Difficulty ramp every 10s (600 frames)
  if (elapsed % 600 < delta) {
    scrollSpeed   = Math.min(scrollSpeed + 0.3, 6);
    spawnInterval = Math.max(spawnInterval - 6, 60);
  }

  bg.update(delta, scrollSpeed);
  player.update(delta);
  enemies.update(delta, scrollSpeed, spawnInterval);
});
</script>
</body>
</html>
